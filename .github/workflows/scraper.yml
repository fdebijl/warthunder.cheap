name: Checks (scraper)

on: [push]

env:
  NODE_VERSION: 22
  CI: true
  NODE_ENV: ci

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --workspace=scraper
      - name: Run lint
        run: npm run lint --workspace=scraper
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --workspace scraper
      - name: Build
        run: npm run build --workspace=shared --workspace=scraper
  dry-run:
    name: Build and Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build datamine vehicle DB
        run: |
          chmod +x ./.github/build-vehicle-db.sh
          ./.github/build-vehicle-db.sh
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build dockerfile
        uses: docker/build-push-action@v7
        with:
          push: false
          load: true
          tags: wtcheap.scraper:latest-ci
          context: .
          file: ./Dockerfile.scraper
      - uses: supercharge/mongodb-github-action@1.12.1
      - name: Dry run image
        run: |
          chmod +x ./.github/dry-run.sh
          ./.github/dry-run.sh scraper
        env:
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          MAILGUN_SENDER: ${{ secrets.MAILGUN_SENDER }}
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push image to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: fdebijl/warthunder.cheap:latest-scraper
          context: .
          file: ./Dockerfile.scraper
